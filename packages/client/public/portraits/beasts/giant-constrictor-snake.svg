<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="#1a2020"/>
  <g fill="#d0c8b0">
    <!-- Coiled snake body -->
    <path d="M32 50 Q18 50 14 42 Q10 34 16 28 Q22 22 30 24 Q38 26 42 32 Q46 38 42 44 Q38 50 32 50Z" fill="none" stroke="#7a8a5a" stroke-width="5" stroke-linecap="round"/>
    <!-- Inner coil -->
    <path d="M30 44 Q22 42 20 36 Q18 30 24 28 Q30 26 34 30 Q38 34 36 40 Q34 44 30 44Z" fill="none" stroke="#8a9a6a" stroke-width="4" stroke-linecap="round"/>
    <!-- Head -->
    <ellipse cx="28" cy="20" rx="6" ry="4" fill="#8a9a6a"/>
    <!-- Neck connecting to coil -->
    <path d="M30 24 L30 22" stroke="#7a8a5a" stroke-width="4" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="26" cy="19" r="1.2" fill="#c4a63a"/>
    <circle cx="26" cy="19" r="0.6" fill="#1a2020"/>
    <!-- Tongue -->
    <path d="M22 20 L18 18 M22 20 L18 22" fill="none" stroke="#c4463a" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Scale pattern -->
    <path d="M16 36 L18 34 M20 30 L22 28 M36 36 L38 34 M34 42 L36 40" fill="none" stroke="#6a7a4a" stroke-width="0.8"/>
  </g>
</svg>