<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="#1a2020"/>
  <g fill="#d0c8b0">
    <!-- Head -->
    <ellipse cx="32" cy="26" rx="13" ry="11" fill="#9a8a5a"/>
    <!-- Ears - round -->
    <circle cx="20" cy="18" r="5" fill="#8a7a4a"/>
    <circle cx="44" cy="18" r="5" fill="#8a7a4a"/>
    <!-- Inner ears -->
    <circle cx="20" cy="18" r="3" fill="#6a5a3a"/>
    <circle cx="44" cy="18" r="3" fill="#6a5a3a"/>
    <!-- Muzzle -->
    <ellipse cx="32" cy="32" rx="7" ry="5" fill="#7a6a3a"/>
    <!-- Nose -->
    <ellipse cx="32" cy="30" rx="3" ry="2" fill="#2a2020"/>
    <!-- Spots -->
    <circle cx="22" cy="24" r="2" fill="#6a5a2a"/>
    <circle cx="42" cy="24" r="2" fill="#6a5a2a"/>
    <circle cx="26" cy="20" r="1.5" fill="#6a5a2a"/>
    <circle cx="38" cy="20" r="1.5" fill="#6a5a2a"/>
    <!-- Eyes - intense -->
    <ellipse cx="25" cy="24" rx="2.5" ry="2" fill="#2a2020"/>
    <ellipse cx="39" cy="24" rx="2.5" ry="2" fill="#2a2020"/>
    <!-- Eye shine -->
    <circle cx="26" cy="23.5" r="0.7" fill="#5a4a2a"/>
    <circle cx="40" cy="23.5" r="0.7" fill="#5a4a2a"/>
    <!-- Mohawk/mane line -->
    <path d="M28 14 L30 10 L32 14 L34 10 L36 14" fill="none" stroke="#5a4a2a" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Mouth snarl -->
    <path d="M26 34 Q32 38 38 34" fill="none" stroke="#2a2020" stroke-width="1"/>
    <!-- Chest/mane -->
    <path d="M18 36 Q32 44 46 36 L46 56 Q32 58 18 56Z" fill="#8a7a4a"/>
  </g>
</svg>