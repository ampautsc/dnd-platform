    <ellipse cx="32" cy="38" rx="6" ry="5" fill="#1a1a1a" stroke="#d0c8b0" stroke-width="0.8"/>
    <!-- Legs - 8 legs radiating out -->
    <!-- Left legs -->
    <path d="M28 26 L14 14 L10 12" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26 28 L12 22 L8 20" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26 34 L12 38 L8 42" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26 38 L14 48 L10 52" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right legs -->
    <path d="M36 26 L50 14 L54 12" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M38 28 L52 22 L56 20" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M38 34 L52 38 L56 42" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M38 38 L50 48 L54 52" fill="none" stroke="#d0c8b0" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eyes (multiple) -->
    <circle cx="29" cy="22" r="1.2" fill="#c4463a"/>
    <circle cx="35" cy="22" r="1.2" fill="#c4463a"/>
    <circle cx="30" cy="24" r="0.8" fill="#c4463a"/>
    <circle cx="34" cy="24" r="0.8" fill="#c4463a"/>
    <!-- Fangs/chelicerae -->
    <path d="M30 26 L29 28 M34 26 L35 28" fill="none" stroke="#c4463a" stroke-width="1" stroke-linecap="round"/>
    <!-- Abdomen pattern -->
    <path d="M30 36 L32 34 L34 36 L32 40Z" fill="#3a2a2a"/>
  </g>
</svg>