    <!-- Armor plates/ridges -->
    <ellipse cx="24" cy="30" rx="4" ry="3" fill="#a09480"/>
    <ellipse cx="34" cy="28" rx="4" ry="3" fill="#a09480"/>
    <ellipse cx="28" cy="36" rx="3" ry="2.5" fill="#a09480"/>
    <ellipse cx="38" cy="34" rx="3" ry="2.5" fill="#a09480"/>
    <!-- Side spikes -->
    <path d="M14 30 L10 26 L16 30" fill="#b0a890"/>
    <path d="M14 36 L8 36 L14 38" fill="#b0a890"/>
    <path d="M46 32 L50 28 L46 34" fill="#b0a890"/>
