<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <circle cx="32" cy="32" r="31" fill="#1a2020"/>
  <g fill="#d0c8b0">
    <!-- Body - wide and squat -->
    <ellipse cx="32" cy="36" rx="18" ry="12" fill="#5a7a4a"/>
    <!-- Head -->
    <ellipse cx="32" cy="26" rx="14" ry="10" fill="#6a8a5a"/>
    <!-- Big eyes on top -->
    <circle cx="24" cy="22" r="5" fill="#8aaa6a"/>
    <circle cx="40" cy="22" r="5" fill="#8aaa6a"/>
    <!-- Pupils -->
    <circle cx="24" cy="22" r="2.5" fill="#1a2020"/>
    <circle cx="40" cy="22" r="2.5" fill="#1a2020"/>
    <!-- Eye shine -->
    <circle cx="25" cy="21" r="1" fill="#aaca8a"/>
    <circle cx="41" cy="21" r="1" fill="#aaca8a"/>
    <!-- Wide mouth -->
    <path d="M16 34 Q32 42 48 34" fill="#4a3a2a"/>
    <!-- Mouth line -->
    <path d="M16 34 Q32 38 48 34" fill="none" stroke="#3a2a1a" stroke-width="1"/>
    <!-- Nostrils -->
    <circle cx="28" cy="28" r="1.2" fill="#4a6a3a"/>
    <circle cx="36" cy="28" r="1.2" fill="#4a6a3a"/>
    <!-- Warts/bumps -->
    <circle cx="20" cy="30" r="1.5" fill="#5a7a4a"/>
    <circle cx="44" cy="30" r="1.5" fill="#5a7a4a"/>
    <circle cx="28" cy="18" r="1" fill="#5a7a4a"/>
    <circle cx="36" cy="18" r="1" fill="#5a7a4a"/>
    <!-- Belly lighter -->
    <ellipse cx="32" cy="42" rx="10" ry="5" fill="#7a9a6a"/>
    <!-- Front legs hint -->
    <path d="M18 44 L14 50 L16 52" fill="none" stroke="#5a7a4a" stroke-width="2" stroke-linecap="round"/>
    <path d="M46 44 L50 50 L48 52" fill="none" stroke="#5a7a4a" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>