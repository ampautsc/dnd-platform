name: Deploy API

# Deploys the Express REST API to Azure App Service.
# Last triggered: 2026-04-05
# Triggers when API-related packages change on master.
# App Service uses Oryx to run `npm install` after the source is uploaded,
# then starts the server with the configured startup command.

on:
  push:
    branches: [master]
    paths:
      - 'packages/api/**'
      - 'packages/dm/**'
      - 'packages/content/**'
      - 'packages/combat/**'
      - 'packages/world/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy API to App Service
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy the monorepo source. App Service's Oryx build system will run
      # `npm install` automatically (SCM_DO_BUILD_DURING_DEPLOYMENT=true is set
      # in app settings by the provision workflow).
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          package: '.'
