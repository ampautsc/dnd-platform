name: Provision Azure Infrastructure

# One-time workflow. Run it once to create all Azure resources and wire up
# GitHub secrets/variables automatically. After it completes, the deploy
# workflows (deploy-client, deploy-api, deploy-gateway) are ready to use.
#
# Prerequisites (add these two GitHub secrets before running):
#   AZURE_CREDENTIALS  — Service principal JSON from:
#                        az ad sp create-for-rbac --name dnd-deploy \
#                          --role contributor \
#                          --scopes /subscriptions/<YOUR_SUB_ID> \
#                          --sdk-auth
#   GH_PAT             — GitHub Personal Access Token with repo scope
#                        (Settings → Developer settings → Personal access tokens)

on:
  push:
    branches:
      - copilot/fix-deployment-pipeline-issues
    paths:
      - '.github/workflows/azure-provision.yml'
  workflow_dispatch:
    inputs:
      resource_prefix:
        description: 'Prefix for Azure resource names (must be globally unique, e.g. dnd-yourname)'
        required: false
        default: 'dnd-platform'
      location:
        description: 'Azure region'
        required: false
        default: 'eastus'
      sku:
        description: 'App Service Plan SKU (B1 recommended — F1 free but no WebSockets)'
        required: false
        default: 'B1'
        type: choice
        options:
          - B1
          - F1
          - S1
          - P1v3
      anthropic_api_key:
        description: 'Anthropic API key (optional — enables real LLM narration)'
        required: false
        default: ''
      groq_api_key:
        description: 'Groq API key (optional — enables ambient NPC reactions)'
        required: false
        default: ''

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Derive stable resource names from the prefix input
      - name: Set resource names
        id: names
        run: |
          PREFIX="${{ inputs.resource_prefix || 'dnd-platform' }}"
          echo "rg=${PREFIX}-rg"        >> "$GITHUB_OUTPUT"
          echo "plan=${PREFIX}-plan"    >> "$GITHUB_OUTPUT"
          echo "api=${PREFIX}-api"      >> "$GITHUB_OUTPUT"
          echo "gateway=${PREFIX}-gw"   >> "$GITHUB_OUTPUT"
          echo "swa=${PREFIX}-client"   >> "$GITHUB_OUTPUT"

      # ── Infrastructure ────────────────────────────────────────────────────────

      - name: Create Resource Group
        run: |
          az group create \
            --name "${{ steps.names.outputs.rg }}" \
            --location "${{ inputs.location || 'eastus' }}"

      - name: Create App Service Plan
        id: plan
        run: |
          DESIRED_SKU="${{ inputs.sku || 'B1' }}"
          PLAN="${{ steps.names.outputs.plan }}"
          RG="${{ steps.names.outputs.rg }}"
          LOCATION="${{ inputs.location || 'eastus' }}"
          SUB_ID=$(az account show --query id -o tsv)

          # ── Quota family for each SKU tier ──
          # F1 uses "freeAFamily" — it DOES require quota (limit=0 on new subscriptions).
          sku_to_family() {
            case $1 in
              F1|F2|F3) echo "freeAFamily" ;;
              B1|B2|B3) echo "basicAFamily" ;;
              S1|S2|S3) echo "standardDSv2Family" ;;
              P1v3|P2v3|P3v3) echo "standardDv3Family" ;;
              *) echo "" ;;
            esac
          }

          # ── Check quota availability for a VM family ──
          # Returns 0 if quota is available, 1 otherwise.
          check_quota() {
            local family=$1 loc=${2:-$LOCATION}
            if [ -z "$family" ]; then return 0; fi

            local usage limit current quota
            usage=$(az vm list-usage --location "$loc" -o json 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "⚠️  Could not query VM quotas (permissions may be limited) — treating as insufficient"
              return 1
            fi

            quota=$(echo "$usage" | jq "[.[] | select(.name.value == \"$family\")] | .[0] // {}")
            # Azure CLI sometimes returns limit/currentValue as JSON strings ("4") rather
            # than numbers (4).  Strip any surrounding quotes so bash arithmetic works.
            limit=$(echo "$quota" | jq '.limit // 0' | tr -d '"')
            current=$(echo "$quota" | jq '.currentValue // 0' | tr -d '"')
            echo "Quota ($family) @ $loc: limit=$limit  used=$current  available=$((limit - current))"

            [ "$((limit - current))" -ge 1 ]
          }

          # ── Request a quota increase via the Azure Quota REST API ──
          # Returns 0 if immediately approved (Succeeded/Granting), 1 if InProgress/failed.
          request_quota_increase() {
            local family=$1 loc=${2:-$LOCATION}
            echo "📝 Requesting quota increase for $family → 4 vCPUs in $loc..."

            # Ensure the Quota resource provider is registered
            az provider register --namespace Microsoft.Quota 2>/dev/null || true
            sleep 5

            if az rest --method put \
              --url "https://management.azure.com/subscriptions/$SUB_ID/providers/Microsoft.Compute/locations/$loc/providers/Microsoft.Quota/quotas/$family?api-version=2023-02-01" \
              --body "{
                \"properties\": {
                  \"limit\": {\"limitObjectType\": \"LimitValue\", \"value\": 4},
                  \"name\": {\"value\": \"$family\"}
                }
              }" > /tmp/quota-response.json 2>&1; then
              local state
              state=$(jq -r '.properties.provisioningState // "unknown"' /tmp/quota-response.json 2>/dev/null)
              echo "   Quota request state: $state"
              if [ "$state" = "Succeeded" ] || [ "$state" = "Granting" ]; then
                return 0
              fi
            else
              echo "   Quota request failed:"
              cat /tmp/quota-response.json 2>/dev/null || true
            fi
            return 1
          }

          # ── Ensure quota and attempt plan creation with a given SKU in a given location ──
          # Returns 0 on success (SKU_USED is set), 1 on failure.
          try_sku_in_location() {
            local sku=$1 loc=$2
            local family
            family=$(sku_to_family "$sku")

            if [ -n "$family" ]; then
              echo "Checking $sku quota ($family) in $loc..."
              if ! check_quota "$family" "$loc"; then
                echo "⚠️  Insufficient quota for $sku in $loc — requesting increase..."
                if request_quota_increase "$family" "$loc"; then
                  echo "✅ Quota approved — waiting 30s for propagation..."
                  sleep 30
                else
                  echo "⏳ Quota increase in progress (InProgress). Waiting 60s before attempting plan creation..."
                  sleep 60
                fi
              fi
            fi

            echo ""
            echo "🔧 Creating App Service Plan with --sku $sku in $loc..."
            if az appservice plan create \
              --name "$PLAN" --resource-group "$RG" --sku "$sku" --is-linux \
              --location "$loc" 2>/tmp/plan-error.txt; then
              SKU_USED="$sku"
              PLAN_LOCATION="$loc"
              return 0
            else
              echo "❌ Failed with $sku in $loc:"
              cat /tmp/plan-error.txt || true
              return 1
            fi
          }

          # ═══════════════════════════════════════════════════════════════
          # Main logic — try preferred SKU first, then F1 fallback,
          # then fall back through alternate regions.
          # New subscriptions often have 0 quota in eastus but quota in
          # other regions (eastus2, westus, centralus).
          # ═══════════════════════════════════════════════════════════════

          SKU_USED=""
          PLAN_LOCATION=""

          # Build ordered list of (sku, location) pairs to attempt
          ATTEMPTS=""
          # Always try desired SKU in desired location first
          ATTEMPTS="$DESIRED_SKU $LOCATION"
          # If not already F1, add F1 in desired location as fallback
          if [ "$DESIRED_SKU" != "F1" ]; then
            ATTEMPTS="$ATTEMPTS|F1 $LOCATION"
          fi
          # Then try alternate regions for both SKUs
          for alt_loc in eastus2 westus centralus westeurope; do
            if [ "$alt_loc" != "$LOCATION" ]; then
              ATTEMPTS="$ATTEMPTS|$DESIRED_SKU $alt_loc"
              if [ "$DESIRED_SKU" != "F1" ]; then
                ATTEMPTS="$ATTEMPTS|F1 $alt_loc"
              fi
            fi
          done

          OLD_IFS="$IFS"
          IFS="|"
          for attempt in $ATTEMPTS; do
            IFS="$OLD_IFS"
            attempt_sku=$(echo "$attempt" | awk '{print $1}')
            attempt_loc=$(echo "$attempt" | awk '{print $2}')
            echo ""
            echo "━━━ Trying $attempt_sku in $attempt_loc ━━━"
            if try_sku_in_location "$attempt_sku" "$attempt_loc"; then
              echo "✅ App Service Plan created with $attempt_sku in $attempt_loc"
              echo "sku_used=$SKU_USED" >> "$GITHUB_OUTPUT"
              if [ "$attempt_loc" != "$LOCATION" ]; then
                echo "location_used=$attempt_loc" >> "$GITHUB_OUTPUT"
              fi
              if [ "$attempt_sku" = "F1" ] || [ "$attempt_sku" != "$DESIRED_SKU" ] || [ "$attempt_loc" != "$LOCATION" ]; then
                echo "fallback_used=true" >> "$GITHUB_OUTPUT"
                if [ "$attempt_sku" = "F1" ]; then
                  {
                    echo ""
                    echo "### ⚠️  Running on Free Tier (F1) in $attempt_loc"
                    echo ""
                    echo "Your subscription did not have **Basic VM** quota in any attempted region."
                    echo "The plan was created on the **Free (F1)** tier as a fallback."
                    echo ""
                    echo "**Limitations on F1:**"
                    echo "- ❌ No WebSocket support (Gateway real-time features will not work)"
                    echo "- ❌ 60 CPU minutes per day"
                    echo "- ❌ No always-on (apps sleep after inactivity)"
                    echo ""
                    echo "**To upgrade later:** Actions → Manage Azure Infrastructure → upgrade-plan-sku"
                  } >> "$GITHUB_STEP_SUMMARY"
                fi
              fi
              exit 0
            fi
            IFS="|"
          done
          IFS="$OLD_IFS"

          echo "❌ All plan creation attempts failed across all SKUs and regions."
          cat /tmp/plan-error.txt || true
          exit 1

      # Generate a strong JWT secret at provision time (never stored in plaintext)
      - name: Generate JWT secret
        id: jwt
        run: |
          JWT=$(openssl rand -hex 32)
          echo "::add-mask::$JWT"
          echo "secret=$JWT" >> "$GITHUB_OUTPUT"

      # ── API App Service ───────────────────────────────────────────────────────

      - name: Create API App Service
        run: |
          az webapp create \
            --name "${{ steps.names.outputs.api }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --plan "${{ steps.names.outputs.plan }}" \
            --runtime "NODE:20-lts"

      - name: Configure API app settings
        run: |
          az webapp config appsettings set \
            --name "${{ steps.names.outputs.api }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --settings \
              NODE_ENV=production \
              WEBSITES_PORT=8080 \
              PORT=8080 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=true \
              DB_PATH=/home/data/dnd-platform.db \
              JWT_SECRET="${{ steps.jwt.outputs.secret }}" \
              ANTHROPIC_API_KEY="${{ inputs.anthropic_api_key }}" \
              GROQ_API_KEY="${{ inputs.groq_api_key }}"

      - name: Set API startup command
        run: |
          az webapp config set \
            --name "${{ steps.names.outputs.api }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --startup-file "node packages/api/src/index.js"

      # ── Gateway App Service ───────────────────────────────────────────────────

      - name: Create Gateway App Service
        run: |
          az webapp create \
            --name "${{ steps.names.outputs.gateway }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --plan "${{ steps.names.outputs.plan }}" \
            --runtime "NODE:20-lts"

      - name: Configure Gateway app settings
        run: |
          az webapp config appsettings set \
            --name "${{ steps.names.outputs.gateway }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --settings \
              NODE_ENV=production \
              WEBSITES_PORT=8080 \
              PORT=8080 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              JWT_SECRET="${{ steps.jwt.outputs.secret }}"

      - name: Set Gateway startup command and enable WebSockets
        run: |
          WEBSOCKETS="true"
          if [ "${{ steps.plan.outputs.sku_used }}" = "F1" ]; then
            WEBSOCKETS="false"
            echo "⚠️  WebSockets disabled — not supported on Free (F1) tier"
          fi

          az webapp config set \
            --name "${{ steps.names.outputs.gateway }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --startup-file "node packages/gateway/src/index.js" \
            --web-sockets-enabled "$WEBSOCKETS"

      # ── Static Web App (client) ───────────────────────────────────────────────

      - name: Create Static Web App (Standard tier)
        id: swa
        run: |
          az staticwebapp create \
            --name "${{ steps.names.outputs.swa }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --location "eastus2" \
            --sku Standard

          TOKEN=$(az staticwebapp secrets list \
            --name "${{ steps.names.outputs.swa }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

          SWA_HOST=$(az staticwebapp show \
            --name "${{ steps.names.outputs.swa }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --query defaultHostname -o tsv)
          echo "url=https://$SWA_HOST" >> "$GITHUB_OUTPUT"

      # Link the API App Service as the SWA's backend.
      # This makes SWA transparently proxy /api/* requests to the App Service,
      # so the React client never needs an explicit API base URL.
      - name: Link API backend to Static Web App
        run: |
          API_ID=$(az webapp show \
            --name "${{ steps.names.outputs.api }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --query id -o tsv)

          az staticwebapp backends link \
            --name "${{ steps.names.outputs.swa }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --backend-resource-id "$API_ID" \
            --backend-region "${{ steps.plan.outputs.location_used || inputs.location || 'eastus' }}"

      # ── Store config in GitHub ────────────────────────────────────────────────
      # Secrets: sensitive values (tokens, keys)
      # Variables: non-sensitive config (resource names) used by deploy workflows

      - name: Store GitHub secrets
        run: |
          echo "${{ steps.swa.outputs.token }}" \
            | gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN \
                --repo "${{ github.repository }}"

      - name: Store GitHub variables
        run: |
          gh variable set AZURE_RESOURCE_GROUP \
            --body "${{ steps.names.outputs.rg }}" \
            --repo "${{ github.repository }}"

          gh variable set AZURE_API_APP_NAME \
            --body "${{ steps.names.outputs.api }}" \
            --repo "${{ github.repository }}"

          gh variable set AZURE_GATEWAY_APP_NAME \
            --body "${{ steps.names.outputs.gateway }}" \
            --repo "${{ github.repository }}"

          gh variable set AZURE_SWA_NAME \
            --body "${{ steps.names.outputs.swa }}" \
            --repo "${{ github.repository }}"

      # ── Summary ───────────────────────────────────────────────────────────────

      - name: Print deployment summary
        run: |
          API_HOST=$(az webapp show \
            --name "${{ steps.names.outputs.api }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --query defaultHostName -o tsv)

          GW_HOST=$(az webapp show \
            --name "${{ steps.names.outputs.gateway }}" \
            --resource-group "${{ steps.names.outputs.rg }}" \
            --query defaultHostName -o tsv)

          SKU_USED="${{ steps.plan.outputs.sku_used }}"

          {
            echo "## ✅ Azure Infrastructure Provisioned"
            echo ""
            echo "| Service | URL | Notes |"
            echo "|---|---|---|"
            echo "| 🎮 Client | ${{ steps.swa.outputs.url }} | |"
            echo "| 🧩 API    | https://${API_HOST} | |"
            if [ "$SKU_USED" = "F1" ]; then
              echo "| ⚡ Gateway | https://${GW_HOST} | ⚠️ WebSockets disabled (F1 tier) |"
            else
              echo "| ⚡ Gateway | https://${GW_HOST} | ✅ WebSockets enabled |"
            fi
            echo ""
            echo "**App Service Plan SKU:** $SKU_USED"
            echo ""
            echo "GitHub secrets and variables have been set automatically."
            echo ""
            echo "Push to \`master\` to trigger the deploy workflows."
          } >> "$GITHUB_STEP_SUMMARY"
